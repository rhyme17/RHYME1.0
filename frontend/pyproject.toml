[tool.ruff]
line-length = 120
target-version = "py312"
exclude = ["__pycache__"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true
exclude = ["^apps/web/", "__pycache__"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

